name: Daily Indonesia Business News

on:
  schedule:
    # GitHub Actions cron uses UTC. Beijing 07:47 (UTC+8) = previous day UTC 23:47.
    - cron: "47 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily brief
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: python main.py

      - name: Commit and push generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _posts

          if git diff --cached --quiet; then
            echo "No new post to commit."
            exit 0
          else
            git commit -m "chore: publish daily Indonesia business brief $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
          fi
